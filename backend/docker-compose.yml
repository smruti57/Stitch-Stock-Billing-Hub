version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: shopflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-shopflow}
      MYSQL_USER:          ${MYSQL_USER:-shopflow_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-shopflow_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shopflow_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-shopflow_user}",
             "-p${MYSQL_PASSWORD:-shopflow_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopflow_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MYSQL_HOST:          mysql
      MYSQL_PORT:          3306
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-shopflow}
      MYSQL_USER:          ${MYSQL_USER:-shopflow_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-shopflow_pass}
      JWT_SECRET:          ${JWT_SECRET:-changeme}
      JWT_EXPIRES_IN:      24h
      GST_RATE:            0.18
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shopflow_net
    volumes:
      - .:/app
      - /app/node_modules
    command: ["node", "server.js"]

volumes:
  mysql_data:

networks:
  shopflow_net:
    driver: bridge
